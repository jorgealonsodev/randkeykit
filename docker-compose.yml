services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: randkeykit:local
    container_name: randkeykit
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
