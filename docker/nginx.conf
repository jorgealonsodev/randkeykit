# /etc/nginx/mime.types is included at the http level in the main nginx.conf
# provided by the nginx:1.27-alpine image. The http-level include covers all
# standard MIME types. Custom extensions handled per-location below.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    server_tokens off;
    default_type application/octet-stream;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml
               application/manifest+json application/json;

    # --- HTML pages (immutable ETag) ---
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        # HSTS only effective over HTTPS; safe because container is behind TLS proxy
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /404.html;
    }

    # --- Static assets (long cache) ---
    location ~* \.(css|js|svg|woff2|png|jpg|webp|ico)$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # --- Crawl/discovery files (no-cache) ---
    location = /robots.txt {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
    location = /sitemap.xml {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    error_page 404 /404.html;
}
