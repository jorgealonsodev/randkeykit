<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <main class="flex-1 flex items-center justify-center p-margin-page">

        <span class="text-[20px]" style="font-family:'Material Symbols Outlined'">arrow_back</span>

    </div>
  </main>

  <footer class="bg-surface border-t border-outline-variant py-6">
    <div class="max-w-container mx-auto text-center px-margin-page">
      <span class="font-body-sm text-body-sm text-secondary">&copy; RandKeyKit — Local-First Cryptography</span>
